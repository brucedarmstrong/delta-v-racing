<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>Delta-V Racing</title>
  </head>
  <body class="app">
    <canvas class="stars" id="stars-canvas" aria-hidden="true"></canvas>
    <div class="grid" aria-hidden="true"></div>
    <div class="content">
      <div class="title-block">
        <div class="title-delta">DELTA-V</div>
        <div class="title-racing">RACING</div>
      </div>
      <div class="tagline">Turn-based vector racing</div>
      <div class="username" id="username"></div>
      <canvas class="attract-thumb" id="attract-thumb" width="260" height="160"></canvas>
      <div class="track-info" id="track-info" style="display:none">
        <canvas class="track-thumb" id="track-thumb" width="200" height="130"></canvas>
        <div class="track-info-name" id="track-info-name"></div>
        <div class="track-info-author" id="track-info-author"></div>
      </div>
      <button class="play-btn" id="play-btn">PLAY</button>
      <div class="secondary-btns">
        <button class="sec-btn" id="community-btn">Community Tracks</button>
        <button class="sec-btn" id="leaderboard-btn">Leaderboard</button>
        <button class="sec-btn" id="create-btn">Create Your Own</button>
      </div>
      <div class="build-stamp" id="build-stamp"></div>
    </div>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
