<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 580" width="920" height="580">
  <rect width="920" height="580" fill="#1a1a2e"/>

  <defs>
    <pattern id="checkers" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="7" height="7" fill="white"/>
      <rect x="7" width="7" height="7" fill="black"/>
      <rect y="7" width="7" height="7" fill="black"/>
      <rect x="7" y="7" width="7" height="7" fill="white"/>
    </pattern>
    <marker id="dir" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffdd00" opacity="0.75"/>
    </marker>
    <marker id="vel" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ffff"/>
    </marker>
  </defs>

  <!-- ── Track surface (outer boundary filled) ── -->
  <path d="
    M 100,490
    L 590,490
    Q 720,490 750,370
    Q 780,210 650,160
    L 260,160
    Q 110,160 90,300
    Q 70,420 100,490
    Z"
    fill="#4a4a5a"/>

  <!-- ── Infield / runoff (inner boundary, painted over track to cut the corridor) ── -->
  <path d="
    M 100,410
    L 590,410
    Q 650,410 670,340
    Q 690,240 620,220
    L 260,220
    Q 185,220 175,320
    Q 160,400 100,410
    Z"
    fill="#2d5a1b"/>

  <!-- ── Subtle centerline (dashed, mid-corridor) ── -->
  <path d="
    M 250,450
    L 570,450
    Q 695,450 715,360
    Q 740,198 635,190
    L 260,190
    Q 148,190 133,308
    Q 116,408 130,450
    L 175,450"
    fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="14,10" opacity="0.2"/>

  <!-- ── Direction-of-travel arrows ── -->
  <!-- Bottom straight: → -->
  <line x1="330" y1="450" x2="395" y2="450" stroke="#ffdd00" stroke-width="1.5" opacity="0.7" marker-end="url(#dir)"/>
  <line x1="450" y1="450" x2="515" y2="450" stroke="#ffdd00" stroke-width="1.5" opacity="0.7" marker-end="url(#dir)"/>
  <!-- Right sweeper: ↑ -->
  <line x1="704" y1="395" x2="704" y2="310" stroke="#ffdd00" stroke-width="1.5" opacity="0.7" marker-end="url(#dir)"/>
  <line x1="695" y1="255" x2="678" y2="208" stroke="#ffdd00" stroke-width="1.5" opacity="0.7" marker-end="url(#dir)"/>
  <!-- Top straight: ← -->
  <line x1="530" y1="190" x2="450" y2="190" stroke="#ffdd00" stroke-width="1.5" opacity="0.7" marker-end="url(#dir)"/>
  <line x1="390" y1="190" x2="310" y2="190" stroke="#ffdd00" stroke-width="1.5" opacity="0.7" marker-end="url(#dir)"/>
  <!-- Left hairpin: ↓ -->
  <line x1="133" y1="290" x2="133" y2="360" stroke="#ffdd00" stroke-width="1.5" opacity="0.7" marker-end="url(#dir)"/>

  <!-- ── Wall strokes ── -->
  <path d="
    M 100,490
    L 590,490
    Q 720,490 750,370
    Q 780,210 650,160
    L 260,160
    Q 110,160 90,300
    Q 70,420 100,490
    Z"
    fill="none" stroke="#cccccc" stroke-width="2.5"/>
  <path d="
    M 100,410
    L 590,410
    Q 650,410 670,340
    Q 690,240 620,220
    L 260,220
    Q 185,220 175,320
    Q 160,400 100,410
    Z"
    fill="none" stroke="#cccccc" stroke-width="2.5"/>

  <!-- ── Bezier control point illustration (right sweeper, outer wall) ── -->
  <!-- Shows what the "cp" field in WallSegment means -->
  <line x1="590" y1="490" x2="720" y2="490" stroke="#ff6699" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="720" y1="490" x2="750" y2="370" stroke="#ff6699" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <circle cx="720" cy="490" r="4" fill="#ff6699" opacity="0.9"/>
  <text x="725" y="505" fill="#ff6699" font-family="monospace" font-size="10" opacity="0.9">cp [720,490]</text>

  <line x1="750" y1="370" x2="780" y2="210" stroke="#ff6699" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="780" y1="210" x2="650" y2="160" stroke="#ff6699" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <circle cx="780" cy="210" r="4" fill="#ff6699" opacity="0.9"/>
  <text x="785" y="208" fill="#ff6699" font-family="monospace" font-size="10" opacity="0.9">cp [780,210]</text>

  <!-- ── Finish line ── -->
  <rect x="196" y="410" width="10" height="80" fill="url(#checkers)"/>
  <!-- FINISH label + leader -->
  <text x="124" y="376" fill="white" font-family="monospace" font-size="12" font-weight="bold">FINISH</text>
  <line x1="160" y1="378" x2="197" y2="415" stroke="white" stroke-width="1" opacity="0.5"/>

  <!-- ── Checkpoint gate ── -->
  <line x1="430" y1="410" x2="430" y2="490" stroke="#ff8c00" stroke-width="2.5" stroke-dasharray="7,4"/>
  <circle cx="430" cy="410" r="5" fill="#ff8c00"/>
  <circle cx="430" cy="490" r="5" fill="#ff8c00"/>
  <!-- CP label -->
  <text x="440" y="444" fill="#ff8c00" font-family="monospace" font-size="12" font-weight="bold">CP 1</text>
  <!-- Gate line in TrackDef: a=[430,410] b=[430,490] -->
  <text x="440" y="458" fill="#ff8c00" font-family="monospace" font-size="9" opacity="0.7">a:[430,410] b:[430,490]</text>

  <!-- ── Car at start position (250, 450), angle=0 facing right ── -->
  <polygon points="268,450 250,441 250,459" fill="#00dd00"/>
  <!-- Velocity vector HUD (projected ~1s ahead) -->
  <line x1="259" y1="450" x2="350" y2="450" stroke="#00ffff" stroke-width="2" marker-end="url(#vel)"/>
  <text x="295" y="441" fill="#00ffff" font-family="monospace" font-size="10">v⃗ (HUD)</text>

  <!-- ── Feature labels ── -->
  <!-- Bottom straight -->
  <text x="415" y="542" fill="#999" font-family="monospace" font-size="11" text-anchor="middle">bottom straight</text>
  <line x1="415" y1="535" x2="415" y2="493" stroke="#999" stroke-width="1" opacity="0.4"/>

  <!-- Right sweeper -->
  <text x="810" y="310" fill="#999" font-family="monospace" font-size="11">right</text>
  <text x="805" y="325" fill="#999" font-family="monospace" font-size="11">sweeper</text>

  <!-- Top straight -->
  <text x="450" y="138" fill="#999" font-family="monospace" font-size="11" text-anchor="middle">top straight</text>

  <!-- Left hairpin -->
  <text x="18" y="305" fill="#999" font-family="monospace" font-size="11">left</text>
  <text x="12" y="320" fill="#999" font-family="monospace" font-size="11">hairpin</text>

  <!-- Wall labels -->
  <text x="640" y="520" fill="#aaa" font-family="monospace" font-size="10">← outer wall</text>
  <text x="440" y="402" fill="#888" font-family="monospace" font-size="10">inner wall →</text>

  <!-- cp legend -->
  <circle cx="730" cy="540" r="4" fill="#ff6699" opacity="0.9"/>
  <text x="740" y="544" fill="#ff6699" font-family="monospace" font-size="10" opacity="0.9">bezier control point (cp field)</text>

  <!-- Title -->
  <text x="460" y="570" fill="#555" font-family="monospace" font-size="11" text-anchor="middle">delta-v demo circuit — car travels clockwise (↓ = screen-down)</text>
</svg>
